<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">SJ Mithila logo</title>
  <desc id="desc">Black and yellow SJ shield logo with Mithila painting inspired fish, lotus, leaf, and dotted motifs.</desc>
  <defs>
