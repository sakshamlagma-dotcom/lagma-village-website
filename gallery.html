<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Lagma Village photo gallery with upload, old photos, filters, search, and full-screen preview.">
  <meta name="robots" content="index, follow">
  <meta name="google-analytics-id" content="G-PZQ45J2B8G">
  <link rel="canonical" href="https://sakshamlagma-dotcom.github.io/lagma-village-website/gallery.html">
  <meta property="og:title" content="Lagma Gallery | Lagma Village">
  <meta property="og:description" content="Lagma village photos, memories, and upload system.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://sakshamlagma-dotcom.github.io/lagma-village-website/gallery.html">
  <meta property="og:image" content="https://sakshamlagma-dotcom.github.io/lagma-village-website/a.jpeg">
  <title>Lagma Gallery | Lagma Village Saharsa Bihar</title>
  <link rel="manifest" href="manifest.webmanifest?v=6">
  <link rel="apple-touch-icon" href="icons/lagma-icon-192.png">
  <link rel="icon" href="icons/lagma-icon-192.png" type="image/png">
  <link rel="stylesheet" href="gallery.css?v=6">
  <script src="analytics.js?v=3" defer></script>
</head>
<body>
  <header class="gallery-header">
    <a class="brand-mark" href="index.html" aria-label="Lagma Village home">
      <span>LG</span>
      <strong>Lagma Gallery</strong>
    </a>
    <button class="menu-toggle" type="button" aria-label="Open navigation" aria-expanded="false">Menu</button>
    <nav class="gallery-nav" aria-label="Main navigation">
      <a href="index.html">Home</a>
      <a href="kissan-help/index.html">Kissan Help</a>
      <a href="gallery.html" aria-current="page">Gallery</a>
    </nav>
  </header>

  <main class="gallery-system">
    <section class="system-title" aria-labelledby="gallery-title">
      <p class="eyebrow">Lagma photo collection</p>
      <h1 id="gallery-title">Lagma Gallery</h1>
      <p>Photo dekhein, naya photo upload karein, aur Lagma ki yaadon ko ek jagah sambhalein.</p>
    </section>

    <div class="gallery-workspace">
      <section class="gallery-upload-box" aria-labelledby="upload-title">
        <div class="upload-heading">
          <div>
            <p class="eyebrow">Upload photo</p>
            <h2 id="upload-title">Naya photo add karein</h2>
          </div>
          <span>Live gallery</span>
        </div>

        <form id="gallery-upload-form" class="inline-upload-form" data-dedicated-gallery-upload>
          <label class="inline-drop-zone" id="inline-drop-zone" for="gallery-photo-input">
            <input id="gallery-photo-input" name="photo" type="file" accept="image/*,.heic,.heif,.avif,.jfif,.tif,.tiff,.bmp" required>
            <strong>Photo choose karein</strong>
            <small>Phone ki sabhi photo formats supported</small>
          </label>

          <div class="inline-preview" id="gallery-upload-preview" hidden>
            <img src="" alt="Selected photo preview">
            <button type="button" id="remove-gallery-photo">Remove</button>
          </div>

          <div class="inline-upload-fields">
            <label>
              Photo title
              <input id="photo-title" name="title" type="text" placeholder="Optional — naam automatic ban jayega" maxlength="80">
            </label>

            <label>
              Category
              <select id="photo-category" name="category">
                <option value="">Optional category</option>
                <option>Village Life</option>
                <option>Culture & Festival</option>
                <option>School & Education</option>
                <option>Farming & Nature</option>
                <option>Development Work</option>
                <option>People of Lagma</option>
              </select>
            </label>

            <label class="full-field">
              Description
              <textarea id="photo-description" name="description" rows="3" placeholder="Optional description" maxlength="220"></textarea>
            </label>
          </div>

          <div class="inline-progress" id="inline-progress" hidden>
            <span></span>
          </div>

          <button class="primary-action" type="submit">Upload Photo</button>
          <p class="upload-status" id="gallery-upload-status" aria-live="polite"></p>
        </form>
      </section>

      <section class="gallery-dashboard" aria-label="Photo gallery">
        <div class="dashboard-heading compact-heading">
          <div>
            <p class="eyebrow">Photos</p>
            <h2>Photo dekhna</h2>
          </div>
        </div>

        <div class="gallery-stats" aria-live="polite">
          <strong id="visible-count">0</strong>
          <span>photos</span>
        </div>

        <div class="premium-grid" id="gallery-grid" aria-live="polite"></div>
        <p class="empty-state" id="gallery-empty" hidden>No photos found.</p>
      </section>
    </div>
  </main>

  <div class="lightbox" id="gallery-lightbox" hidden>
    <button class="lightbox-close" type="button" aria-label="Close preview">&times;</button>
    <button class="lightbox-arrow lightbox-prev" type="button" aria-label="Previous photo">&lt;</button>
    <figure class="lightbox-frame">
      <img src="" alt="">
      <figcaption>
        <span id="lightbox-category"></span>
        <h2 id="lightbox-title"></h2>
        <p id="lightbox-description"></p>
      </figcaption>
    </figure>
    <button class="lightbox-arrow lightbox-next" type="button" aria-label="Next photo">&gt;</button>
  </div>

  <script src="web.js?v=24"></script>
  <script src="gallery.js?v=9"></script>
  <script src="assets/lucide.min.js?v=1"></script>
  <script src="lagma-icons.js?v=1"></script>
</body>
</html>
